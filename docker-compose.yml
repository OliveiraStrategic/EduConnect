version: '3.8'

services:
  # Banco de Dados PostgreSQL Relacional
  postgres_db:
    image: postgres:15-alpine
    container_name: educonnect_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: educonnect
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Carrega o schema inicial automaticamente se a pasta do banco estiver vazia
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - educonnect_network

  # API Servidor Backend Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: educonnect_backend
    restart: always
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres_db:5432/educonnect
      JWT_SECRET: chave_secreta_super_segura_para_producao_educonnect_jwt
    ports:
      - "5000:5000"
    depends_on:
      - postgres_db
    networks:
      - educonnect_network

  # Servidor Frontend Nginx com os assets compilados do React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: educonnect_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - educonnect_network

volumes:
  pgdata:
    driver: local

networks:
  educonnect_network:
    driver: bridge
